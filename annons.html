<!DOCTYPE html>

<body>
    <!-- Advertisment Card -->

        <!-- Ad card innehåll med render() -->

    <!-- Modal -->

    <script>
        async function main() {
            // TODO: Ställ dynamiskt in språket på detta HTML dokument utifrån parent sidans språk

            // Hitta användarens koordinater
            const coordinates = await findMyCoordinates();
            if (coordinates) {
                console.log("longitude:", coordinates.longitude);
                console.log("latitude:", coordinates.latitude);
            }

            // GET världsarv baserat på användarens koordinater från API
            const worldHeritage = await getWorldHeritage(coordinates);
            console.log(worldHeritage);

            // Render det riktiga innehållet (ersätt placeholder div:en)
            render(worldHeritage);

            // Hantering av personuppgifter submit
            handleSubmit();

            // renderOrderConfirmation();
        }
        main();

        async function findMyCoordinates() {
            if (navigator.geolocation) {              
                return new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(success, error);

                    function success(position) {
                        const crd = position.coords;
                        resolve(crd);
                    }

                    function error(error) {
                        console.error(error.message)
                        resolve(null);
                    }
                });
            }

            else {
                /* geolocation IS NOT supported */
                console.error("Geolocation is not supported by this browser.");
            }
        }

        async function getWorldHeritage(coords) {
            let url;
            if (coords) {
                url = `http://localhost:8000/something?longitude=${coords.longitude}&latitude=${coords.latitude}`
            }
            else {
                url = "http://localhost:8000/something"
            }

            try {
                // Hämtar världsarv från Backend API
                const response = await fetch(url);
                const data = await response.json();

                // Retunerar världsarv
                return data;

            } catch (error) {
                console.error(error);
                return {};
            }
        }

        function render(worldHeritage) {

                    </div>
                </div>
            </div>
            `;

            const button = document.getElementById("more-btn");
            const closeModalButton = document.getElementById("close-modal-btn");
            
            // För att öppna popup/modalen
            button.addEventListener("click", async () => {
                var msg = await JSON.stringify( {"endpoint": "open-popup"} );
                console.log(msg);
                // `${document.URL}`
                window.parent.postMessage( {WorkflowAPICall: msg} );

                // Dölj med class invisible eller d-none ad card div:en
                const card = document.getElementById("ad-card");
                // card.classList.add("invisible");
                card.classList.add("d-none");

                // Visa nu modal/dialog/popup
                const showThis = document.getElementById("popup");
                showThis.classList.remove("d-none");
            });

            // För att stänga popup/modalen
            closeModalButton.addEventListener("click", async () => {
                var msg = await JSON.stringify( {"endpoint": "close-popup"} );
                console.log(msg);
                window.parent.postMessage( {WorkflowAPICall: msg} );

                // Dölj modal/dialog/popup (#popup) med .add("d-none")
                const showThis = document.getElementById("popup");
                showThis.classList.add("d-none");

                // Visa ad card div:en (#ad-card) igen med .remove("d-none")
                const card = document.getElementById("ad-card");
                card.classList.remove("d-none");
            });
            updateResponsiveLayout();
            window.addEventListener("resize", updateResponsiveLayout); 
        }
    
        function handleSubmit() {
            const form = document.getElementById("form-personaldetails");
            const submitBtn = document.getElementById("personaldetails-submit-btn");

            // Lägger till händelselyssnare på personuppgifter (skapa konto) formulär
            form.addEventListener("submit", async (event) => {
                event.preventDefault(); // Stoppar omladdning av sidan
                
                // TODO: Spinner för submit knappen & disable form inputs vid submit av personuppgifter
                toggleSpinnerLoader(submitBtn, true);
                
                formInputDisable("form-personaldetails")

                const formData = new FormData(form);

                // Convert to plain object
                const data = Object.fromEntries(formData.entries());
                console.log("Form data:", data);

                // Kallar på backend för att få Stripe client secret sträng
                const clientSecret = await getClientSecret(data);
                console.log("Stripe ClientSecret:", clientSecret);

                // TODO: Hantering av ifall clientSecret är null
                if (!clientSecret) {
                    alert("clientSecret är null! Någon/några av personuppgifterna är redan upptagna!")
                    return
                }

                // Stänger Personuppgifter accordion formulär och öppnar Betalning accordion formulär
                document.getElementById("accordion-header-personaldetails-btn").classList.add("collapsed");
                document.getElementById("collapseOne").classList.remove("show");
                document.getElementById("accordion-header-payment-btn").classList.remove("collapsed");
                document.getElementById("collapseTwo").classList.add("show");

                // Init Stripe Payment
                initStripePayment(clientSecret);
            });
        }
    
        async function getClientSecret(data) {
            const response = await fetch("http://127.0.0.1:8000/secret", {
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                method: "POST",
                body: JSON.stringify(data),
            });

            const clientSecret = await response.json();

            return clientSecret;
        }

        async function initStripePayment(clientSecret) {
            stripe = Stripe('pk_test_51TZBpvRfGL28nQKFtwc6eldofWKeQpsJ9ozCVHaVgSXC2WcUNiaDEjzP0hdO53oiZ1Z7eMt2BlUyJePxRZIxwsRx00oK3unykG');

            const elements = stripe.elements({
                locale: "en" // TODO: Bör vara dynamiskt värde från parent sida (document.documentElement.lang)
            });
            cardElement = elements.create("card");
            cardElement.mount("#card-element");

            const form = document.querySelector('#form-payment');
            const submitBtn = document.getElementById("payment-submit-btn");

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                
                toggleSpinnerLoader(submitBtn, true);
                
                // Skapa payment method och bekräfta payment intent
                const result = await stripe.confirmCardPayment(clientSecret, {
                    payment_method: {
                        card: cardElement
                    }
                });

                // Hantera resultat från Stripes egna Backend HTTP Response till stripe.confirmCardPayment()
                if (result.error) {
                    toggleSpinnerLoader(submitBtn, false);
                    alert(`Payment failed: ${result.error.message}`);
                } else {
                    // alert("Success!");
                    // TODO: Här bör orderbekräftelse visas

                    // Dölj offer 👍
                    document.getElementById("offer").classList.add("d-none");

                    // Lägg Spinner som laddar eller placeholder skeleton inuti orderbekräftelse div 👍
                    toggleSpinnerLoader(submitBtn, false);

                    // Hämta (HTTP Request) dynamisk order/payment/subscription data 👍
                    // Kanske Request -> Backend (endpoint: /payment-confirmation||order-confirmation)
                    // Går det bra att hämta datan så dölj/ta bort spinner

                    // Render (visa dynamiskt innehåll/data med innerHTML inuti orderbekräftelse div)
                    // den tar in som argument datan som kommit från /order-confirmation
                    
                    renderOrderConfirmation();
                }
            });
        }

        function renderOrderConfirmation() {
            // Skapar container för orderbekräftelse
            const orderConfirmationContainer = document.createElement("div");
            

            orderConfirmationContainer.innerHTML =
            `

                    <div class="card-body p-4 text-center">

                        </div>

                        <div class="bg-light p-3 rounded mb-4 text-start">

                            <div class="d-flex justify-content-between text-muted small mb-1">
                                <span>Registreringsdatum:</span>
                                <span class="fw-semibold text-dark">17-06-2026</span>
                            </div>
                            <div class="d-flex justify-content-between text-muted small">
                                <span>Prenumerationstyp:</span>
                                <span class="fw-semibold text-dark">59 kr/mån</span>
                            </div>
                        </div>

                        <div class="text-start mb-4">
                            <h6 class="fw-bold">Vad händer nu?</h6>
                            <ul class="list-unstyled text-secondary small">
                                <li class="mb-2">
                                    <i class="bi bi-check-circle-fill text-success me-2"></i>Ett bekräftelsemejl har skickats till din e-post.
                                </li>
                                <li>
                                    <i class="bi bi-check-circle-fill text-success me-2"></i>Klicka på länken i mejlet för att aktivera ditt konto.
                                </li>
                            </ul>
                        </div>

                        <button class="btn btn-primary w-50 py-2 text-nowrap" onclick="#">Stäng</button>
                    
                    </div>

                </div>

            </div>
            `;

            // Bifogar orderbekräftelse container till popup
            const popup = document.getElementById("popup");
            popup.appendChild(orderConfirmationContainer);
        }
        
        // Uppdaterar layouten för annons baserat på fönstrets storlek
        function updateResponsiveLayout() {
            const adCard = document.getElementById("ad-card");
            if (!adCard) return;

            const isMobile = window.innerWidth < 650;

            // Grupperade regler per element
            const layoutConfig = [
                {
                    element: adCard.querySelector(".card-img-overlay"),
                    mobile: ["flex-column", "gap-1", "p-2"],
                    desktop: ["flex-row", "gap-3"]
                },
                {
                    element: adCard.querySelector(".card-title"),
                    mobile: ["h5", "mb-0"],
                    desktop: [] 
                },
                {
                    element: adCard.querySelector(".card-subtitle"),
                    mobile: ["h6", "mb-0"],
                    desktop: ["mb-1"]
                },
                {
                    element: adCard.querySelector(".card-text"),
                    mobile: ["d-none"],
                    desktop: []
                },
                {
                    element: adCard.querySelector("#more-btn"),
                    mobile: ["btn-sm"],
                    desktop: []
                }
            ];

            // Applicera alla layoutregler genom att toggla klasser baserat på skärmläge
            layoutConfig.forEach(({ element, mobile, desktop }) => {
                if (!element) return;

                mobile.forEach(className => element.classList.toggle(className, isMobile));
                desktop.forEach(className => element.classList.toggle(className, !isMobile));
            });
        }
        
        // 
        function formInputDisable(formId) {
            const form = document.getElementById(formId);
            if (!form) return;

            // Hämta alla fält
            const elements = form.querySelectorAll("input, textarea, select");
            
            // Loopa igenom och lägg på disabled
            elements.forEach(el => {
                el.disabled = true; 
            });

            // Knappar disable:as också
            const buttons = form.querySelectorAll("button");
            buttons.forEach(btn => btn.disabled = true);
        }

        // Hanterar knappens laddningsläge
        function toggleSpinnerLoader(btnElement, isLoading) {
            // Spara originalinnehåll vid första körning
            btnElement.dataset.originalText ||= btnElement.innerHTML;

            // Visa spinner + text vid laddning, annars återställ original
            btnElement.innerHTML = isLoading 
                ? `<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>${btnElement.dataset.originalText}`
                : btnElement.dataset.originalText;

            // Inaktivera knapp vid laddning för att undvika dubbelklick
            btnElement.disabled = isLoading;
        }

    </script>
